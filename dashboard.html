<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestellingen Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1219;
      --surface:   #1a2332;
      --surface2:  #232f42;
      --accent:    #3b82f6;
      --text:      #e2e8f0;
      --text-muted:#8899b0;
      --radius:    16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 900px;
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--surface2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.3px; }
    header p  { font-size: .85rem; color: var(--text-muted); margin-top: 4px; }

    .nav-links { display: flex; gap: 16px; align-items: center; flex-shrink: 0; }

    .nav-link {
      font-size: .82rem;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      opacity: .85;
    }
    .nav-link:hover { opacity: 1; text-decoration: underline; }

    /* ── Main ── */
    main {
      width: 100%;
      max-width: 900px;
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .filter-groep {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-groep label { font-size: .85rem; color: var(--text-muted); }

    select {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 8px;
      color: var(--text);
      font-size: .88rem;
      padding: 7px 12px;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--accent); }

    .status-rij {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .8rem;
      color: var(--text-muted);
    }

    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: puls 2s ease-in-out infinite;
    }

    @keyframes puls {
      0%, 100% { opacity: .4; }
      50%       { opacity: 1; }
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px 18px;
    }

    .stat-label { font-size: .72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat-waarde { font-size: 1.6rem; font-weight: 700; margin-top: 4px; }

    /* ── Tabel ── */
    .tabel-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }

    thead th {
      background: var(--surface2);
      color: var(--text-muted);
      font-weight: 500;
      font-size: .74rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 11px 16px;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr { transition: background .15s; }
    tbody tr:hover td { background: var(--surface2); }

    td {
      background: var(--surface);
      padding: 11px 16px;
      border-top: 1px solid var(--bg);
      vertical-align: top;
    }

    .klant-badge {
      display: inline-block;
      background: rgba(59,130,246,.15);
      color: var(--accent);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: .78rem;
      font-weight: 500;
    }

    .items-lijst { line-height: 1.7; }
    .item-regel  { display: flex; gap: 6px; }
    .item-aantal { color: var(--accent); font-weight: 600; min-width: 28px; }

    .tijdstip      { color: var(--text-muted); font-size: .82rem; }
    .tijdstip-dag  { display: block; color: var(--text); font-size: .88rem; font-weight: 500; }

    /* ── Lege staat ── */
    .leeg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: .92rem;
    }

    /* ── Laadindicator ── */
    .laden {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Fout ── */
    .fout-banner {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: .88rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header, main { padding-left: 14px; padding-right: 14px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Bestellingen Dashboard</h1>
    <p>Overzicht van alle geplaatste bestellingen</p>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Chatbot</a>
    <a href="scanner.html" class="nav-link">Scanner</a>
    <a href="leads.html" class="nav-link">Leads</a>
    <a href="kennisbank.html" class="nav-link">Kennisbank</a>
    <a href="report-dashboard.html" class="nav-link">Rapporten</a>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="filter-groep">
      <label for="klant-filter">Klant:</label>
      <select id="klant-filter">
        <option value="">Alle klanten</option>
        <option value="Demo Café">Demo Café</option>
        <option value="Stijlvol">Stijlvol</option>
      </select>
    </div>
    <div class="status-rij">
      <div class="refresh-dot"></div>
      <span id="laatste-update">Laden…</span>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tabel-wrapper" id="tabel-container">
    <div class="laden"><div class="spinner"></div> Bestellingen ophalen…</div>
  </div>
</main>

<script>
  const REFRESH_INTERVAL = 30000
  let refreshTimer = null

  const klantFilter = document.getElementById('klant-filter')

  // Stel filter in vanuit URL parameter
  const urlKlant = new URLSearchParams(window.location.search).get('klant')
  if (urlKlant) klantFilter.value = urlKlant

  klantFilter.addEventListener('change', () => {
    const url = new URL(window.location)
    if (klantFilter.value) url.searchParams.set('klant', klantFilter.value)
    else url.searchParams.delete('klant')
    history.replaceState(null, '', url)
    laadBestellingen()
  })

  async function laadBestellingen() {
    try {
      const params = klantFilter.value
        ? `?klant=${encodeURIComponent(klantFilter.value)}`
        : ''

      const res = await fetch(`/.netlify/functions/haal-bestellingen-op${params}`)
      const data = await res.json()

      if (data.fout) {
        toonFout(data.fout)
        return
      }

      renderStats(data.bestellingen)
      renderTabel(data.bestellingen)

      document.getElementById('laatste-update').textContent =
        'Bijgewerkt om ' + new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
    } catch (e) {
      toonFout('Verbindingsfout: ' + e.message)
    }
  }

  function renderStats(bestellingen) {
    const totaal = bestellingen.length
    const vandaag = bestellingen.filter(b => {
      const d = new Date(b.created_at)
      const nu = new Date()
      return d.getDate() === nu.getDate() &&
             d.getMonth() === nu.getMonth() &&
             d.getFullYear() === nu.getFullYear()
    }).length

    const totaalItems = bestellingen.reduce((som, b) =>
      som + (b.items || []).reduce((s, r) => s + (r.aantal || 0), 0), 0)

    const klanten = new Set(bestellingen.map(b => b.klant)).size

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-label">Totaal bestellingen</div><div class="stat-waarde">${totaal}</div></div>
      <div class="stat"><div class="stat-label">Vandaag</div><div class="stat-waarde">${vandaag}</div></div>
      <div class="stat"><div class="stat-label">Totaal items</div><div class="stat-waarde">${totaalItems}</div></div>
      <div class="stat"><div class="stat-label">Klanten</div><div class="stat-waarde">${klanten}</div></div>`
  }

  function renderTabel(bestellingen) {
    const container = document.getElementById('tabel-container')

    if (!bestellingen.length) {
      container.innerHTML = '<div class="leeg">Geen bestellingen gevonden.</div>'
      return
    }

    const rijen = bestellingen.map(b => {
      const datum = new Date(b.created_at)
      const dagStr = datum.toLocaleDateString('nl-NL', { day: '2-digit', month: '2-digit', year: 'numeric' })
      const tijdStr = datum.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })

      const itemsHtml = (b.items || []).map(r =>
        `<div class="item-regel"><span class="item-aantal">${r.aantal}×</span><span>${r.item}</span></div>`
      ).join('')

      return `
        <tr>
          <td><span class="klant-badge">${escHtml(b.klant)}</span></td>
          <td><div class="items-lijst">${itemsHtml || '—'}</div></td>
          <td>
            <span class="tijdstip-dag">${dagStr}</span>
            <span class="tijdstip">${tijdStr}</span>
          </td>
        </tr>`
    }).join('')

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Klant</th>
            <th>Items</th>
            <th>Tijdstip</th>
          </tr>
        </thead>
        <tbody>${rijen}</tbody>
      </table>`
  }

  function toonFout(tekst) {
    document.getElementById('tabel-container').innerHTML =
      `<div class="fout-banner">${escHtml(tekst)}</div>`
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
  }

  function startAutoRefresh() {
    clearInterval(refreshTimer)
    refreshTimer = setInterval(laadBestellingen, REFRESH_INTERVAL)
  }

  laadBestellingen()
  startAutoRefresh()
</script>
</body>
</html>
