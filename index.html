<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
</head>
<body>
  <h2 id="titel">Chatbot</h2>
  <div id="chat" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:auto; margin-bottom:10px;"></div>
  <input id="bericht" placeholder="Typ je bericht..." style="width:400px">
  <button onclick="stuurBericht()">Verstuur</button>

  <script>
    let geschiedenis = []
    let bedrijfsnaam = 'Assistent'

    async function laadConfig() {
      const res = await fetch('/.netlify/functions/get-config')
      const config = await res.json()
      bedrijfsnaam = config.bedrijfsnaam
      document.getElementById('titel').textContent = bedrijfsnaam
      document.title = bedrijfsnaam
    }

    async function stuurBericht() {
      const bericht = document.getElementById('bericht').value
      if (!bericht) return

      voegToeAanChat('Jij', bericht)
      geschiedenis.push({ role: 'user', content: bericht })
      document.getElementById('bericht').value = ''

      const res = await fetch('/.netlify/functions/vraag-claude', {
        method: 'POST',
        body: JSON.stringify({ geschiedenis })
      })

      const data = await res.json()
      voegToeAanChat(bedrijfsnaam, data.antwoord)
      geschiedenis.push({ role: 'assistant', content: data.antwoord })
    }

    function voegToeAanChat(naam, tekst) {
      const chat = document.getElementById('chat')
      chat.innerHTML += `<p><strong>${naam}:</strong> ${tekst}</p>`
      chat.scrollTop = chat.scrollHeight
    }

    laadConfig()
  </script>
</body>
</html>
