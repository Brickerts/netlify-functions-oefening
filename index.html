<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1219;
      --surface:   #1a2332;
      --surface2:  #232f42;
      --accent:    #3b82f6;
      --text:      #e2e8f0;
      --text-muted:#8899b0;
      --radius:    16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 700px;
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--surface2);
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    header p {
      font-size: .85rem;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 700px;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* scrollbar */
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .bericht-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }

    .bericht-wrapper.gebruiker {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bericht-wrapper.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: .93rem;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .gebruiker .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bot .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: .7rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: var(--surface);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: .3; transform: scale(.85); }
      40%           { opacity: 1;  transform: scale(1);   }
    }

    /* ── Input bar ── */
    #inputbar {
      width: 100%;
      max-width: 700px;
      padding: 12px 20px 20px;
      display: flex;
      gap: 10px;
    }

    #bericht {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: 24px;
      color: var(--text);
      font-size: .93rem;
      padding: 10px 18px;
      outline: none;
      transition: border-color .2s;
    }

    #bericht::placeholder { color: var(--text-muted); }
    #bericht:focus { border-color: var(--accent); }
    #bericht:disabled { opacity: .5; cursor: not-allowed; }

    #verstuur {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .2s;
    }

    #verstuur:hover { opacity: .85; }
    #verstuur:disabled { opacity: .4; cursor: not-allowed; }

    #verstuur svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header { padding: 16px 14px 12px; }
      #chat   { padding: 14px 14px 6px; }
      #inputbar { padding: 10px 14px 16px; }
      .bericht-wrapper { max-width: 88%; }
    }
  </style>
</head>
<body>

  <header>
    <h1 id="titel">Chatbot</h1>
    <p id="beschrijving"></p>
  </header>

  <div id="chat"></div>

  <div id="inputbar">
    <input id="bericht" placeholder="Typ een bericht..." autocomplete="off" disabled>
    <button id="verstuur" onclick="stuurBericht()" disabled>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <script>
    const klant = new URLSearchParams(window.location.search).get('klant') || 'demo'
    let geschiedenis = []
    let bedrijfsnaam = 'Assistent'
    const chatEl = document.getElementById('chat')

    function nu() {
      return new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })
    }

    function scrollNaarOnder() {
      chatEl.scrollTop = chatEl.scrollHeight
    }

    function voegToeAanChat(rol, tekst) {
      const wrapper = document.createElement('div')
      wrapper.className = `bericht-wrapper ${rol}`

      const bubble = document.createElement('div')
      bubble.className = 'bubble'
      bubble.textContent = tekst

      const ts = document.createElement('span')
      ts.className = 'timestamp'
      ts.textContent = nu()

      wrapper.appendChild(bubble)
      wrapper.appendChild(ts)
      chatEl.appendChild(wrapper)
      scrollNaarOnder()
    }

    function toonTypingIndicator() {
      const wrapper = document.createElement('div')
      wrapper.className = 'bericht-wrapper bot'
      wrapper.id = 'typing'

      const bubble = document.createElement('div')
      bubble.className = 'typing-bubble'
      bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>'

      wrapper.appendChild(bubble)
      chatEl.appendChild(wrapper)
      scrollNaarOnder()
    }

    function verwijderTypingIndicator() {
      const el = document.getElementById('typing')
      if (el) el.remove()
    }

    function setBezig(bezig) {
      document.getElementById('bericht').disabled = bezig
      document.getElementById('verstuur').disabled = bezig
      if (!bezig) document.getElementById('bericht').focus()
    }

    // Maakt een lege bot-bubble aan die progressief gevuld wordt.
    // Geeft { bubble, finaliseer } terug.
    function maakStreamBubble() {
      const wrapper = document.createElement('div')
      wrapper.className = 'bericht-wrapper bot'

      const bubble = document.createElement('div')
      bubble.className = 'bubble'

      wrapper.appendChild(bubble)
      chatEl.appendChild(wrapper)

      return {
        bubble,
        finaliseer() {
          const ts = document.createElement('span')
          ts.className = 'timestamp'
          ts.textContent = nu()
          wrapper.appendChild(ts)
        }
      }
    }

    async function laadConfig() {
      const res = await fetch(`/.netlify/functions/get-config?klant=${encodeURIComponent(klant)}`)
      const config = await res.json()
      bedrijfsnaam = config.bedrijfsnaam
      document.getElementById('titel').textContent = bedrijfsnaam
      document.title = bedrijfsnaam
      if (config.beschrijving) {
        document.getElementById('beschrijving').textContent = config.beschrijving
      }
      if (config.accentKleur) {
        document.documentElement.style.setProperty('--accent', config.accentKleur)
      }
      setBezig(false)
    }

    // Stuurt bericht via streaming SSE. Als na STREAM_TIMEOUT ms nog geen
    // eerste chunk binnenkomt (= Netlify Dev buffert), valt het terug op JSON.
    const STREAM_TIMEOUT = 2500

    async function stuurBericht() {
      const input = document.getElementById('bericht')
      const bericht = input.value.trim()
      if (!bericht) return

      voegToeAanChat('gebruiker', bericht)
      geschiedenis.push({ role: 'user', content: bericht })
      input.value = ''
      setBezig(true)
      toonTypingIndicator()

      const geslaagd = await probeerStreaming()
      if (!geslaagd) await fallbackJSON()

      setBezig(false)
    }

    async function probeerStreaming() {
      const abortCtrl = new AbortController()
      const timeoutId = setTimeout(() => abortCtrl.abort(), STREAM_TIMEOUT)

      let streamBubble = null
      let volledigAntwoord = ''
      let eersteChunkOntvangen = false

      try {
        const res = await fetch('/.netlify/functions/vraag-claude', {
          method: 'POST',
          body: JSON.stringify({ geschiedenis, klant, stream: true }),
          signal: abortCtrl.signal
        })

        const reader = res.body.getReader()
        const decoder = new TextDecoder()
        let buffer = ''

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          if (!eersteChunkOntvangen) {
            clearTimeout(timeoutId)
            eersteChunkOntvangen = true
          }

          buffer += decoder.decode(value, { stream: true })
          const lines = buffer.split('\n')
          buffer = lines.pop()

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue
            let event
            try { event = JSON.parse(line.slice(6)) } catch { continue }

            if (event.type === 'text') {
              if (!streamBubble) {
                verwijderTypingIndicator()
                streamBubble = maakStreamBubble()
              }
              streamBubble.bubble.textContent += event.delta
              volledigAntwoord += event.delta
              scrollNaarOnder()
            } else if (event.type === 'done') {
              if (streamBubble) streamBubble.finaliseer()
              if (volledigAntwoord) {
                geschiedenis.push({ role: 'assistant', content: volledigAntwoord })
              }
            } else if (event.type === 'error') {
              verwijderTypingIndicator()
              voegToeAanChat('bot', event.fout || 'Er ging iets mis.')
            }
          }
        }

        return eersteChunkOntvangen
      } catch (e) {
        clearTimeout(timeoutId)
        // AbortError = timeout zonder chunk = Netlify Dev buffert → fallback
        if (e.name === 'AbortError') return false
        verwijderTypingIndicator()
        voegToeAanChat('bot', 'Verbindingsfout. Probeer het opnieuw.')
        return true // fout afgehandeld, geen fallback nodig
      }
    }

    async function fallbackJSON() {
      try {
        const res = await fetch('/.netlify/functions/vraag-claude', {
          method: 'POST',
          body: JSON.stringify({ geschiedenis, klant, stream: false })
        })
        const data = await res.json()
        verwijderTypingIndicator()
        voegToeAanChat('bot', data.antwoord || data.fout || 'Er ging iets mis.')
        if (data.antwoord) {
          geschiedenis.push({ role: 'assistant', content: data.antwoord })
        }
      } catch (e) {
        verwijderTypingIndicator()
        voegToeAanChat('bot', 'Verbindingsfout. Probeer het opnieuw.')
      }
    }

    document.getElementById('bericht').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        stuurBericht()
      }
    })

    laadConfig()
  </script>
</body>
</html>
